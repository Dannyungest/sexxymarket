version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: sexxymarket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

  storefront:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.storefront
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "3000:3000"

  merchant:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.merchant
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "3001:3001"

  admin:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.admin
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "3002:3002"

volumes:
  postgres_data:
